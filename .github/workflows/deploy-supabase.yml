name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Each `supabase secrets set` step is gated on the secret being non-empty
      # so a missing repo secret does NOT overwrite an existing edge-function
      # secret with an empty value. Interpolated values are quoted to prevent
      # shell injection if a secret ever contains metacharacters.

      - name: Set EIA_API_KEY
        if: ${{ secrets.EIA_API_KEY != '' }}
        env:
          VAL: ${{ secrets.EIA_API_KEY }}
        run: supabase secrets set "EIA_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      - name: Set FDA_API_KEY
        if: ${{ secrets.FDA_API_KEY != '' }}
        env:
          VAL: ${{ secrets.FDA_API_KEY }}
        run: supabase secrets set "FDA_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      - name: Set BLS_API_KEY
        if: ${{ secrets.BLS_API_KEY != '' }}
        env:
          VAL: ${{ secrets.BLS_API_KEY }}
        run: supabase secrets set "BLS_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      - name: Set CENSUS_API_KEY
        if: ${{ secrets.CENSUS_API_KEY != '' }}
        env:
          VAL: ${{ secrets.CENSUS_API_KEY }}
        run: supabase secrets set "CENSUS_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      - name: Set USITC_API_KEY
        if: ${{ secrets.USITC_API_KEY != '' }}
        env:
          VAL: ${{ secrets.USITC_API_KEY }}
        run: supabase secrets set "USITC_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      # notify-lead webhook path — Resend + Slack notifications.
      # The inline path in apps/web/src/pages/api/submit-lead.ts uses Netlify
      # env vars instead and is independent of these.

      - name: Set RESEND_API_KEY
        if: ${{ secrets.RESEND_API_KEY != '' }}
        env:
          VAL: ${{ secrets.RESEND_API_KEY }}
        run: supabase secrets set "RESEND_API_KEY=$VAL" --project-ref "$PROJECT_REF"

      - name: Set RESEND_FROM_EMAIL
        if: ${{ secrets.RESEND_FROM_EMAIL != '' }}
        env:
          VAL: ${{ secrets.RESEND_FROM_EMAIL }}
        run: supabase secrets set "RESEND_FROM_EMAIL=$VAL" --project-ref "$PROJECT_REF"

      - name: Set NOTIFICATION_EMAIL
        if: ${{ secrets.NOTIFICATION_EMAIL != '' }}
        env:
          VAL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: supabase secrets set "NOTIFICATION_EMAIL=$VAL" --project-ref "$PROJECT_REF"

      - name: Set SLACK_WEBHOOK_URL
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          VAL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: supabase secrets set "SLACK_WEBHOOK_URL=$VAL" --project-ref "$PROJECT_REF"

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
