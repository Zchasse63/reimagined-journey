name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    # All secrets surfaced at job-level env so step-level `if: env.X != ''`
    # conditions can reference them. (GitHub Actions doesn't allow the
    # `secrets` context inside step-level `if:` — only inside `env:` / `with:`
    # and inside JOB-level `if:`. So we map every secret here and gate the
    # individual steps on its env value.)
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
      FDA_API_KEY: ${{ secrets.FDA_API_KEY }}
      BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      USITC_API_KEY: ${{ secrets.USITC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Each `supabase secrets set` step is gated on the env var being non-empty
      # so a missing repo secret does NOT overwrite an existing edge-function
      # secret with an empty value.

      - name: Set EIA_API_KEY
        if: env.EIA_API_KEY != ''
        run: supabase secrets set "EIA_API_KEY=$EIA_API_KEY" --project-ref "$PROJECT_REF"

      - name: Set FDA_API_KEY
        if: env.FDA_API_KEY != ''
        run: supabase secrets set "FDA_API_KEY=$FDA_API_KEY" --project-ref "$PROJECT_REF"

      - name: Set BLS_API_KEY
        if: env.BLS_API_KEY != ''
        run: supabase secrets set "BLS_API_KEY=$BLS_API_KEY" --project-ref "$PROJECT_REF"

      - name: Set CENSUS_API_KEY
        if: env.CENSUS_API_KEY != ''
        run: supabase secrets set "CENSUS_API_KEY=$CENSUS_API_KEY" --project-ref "$PROJECT_REF"

      - name: Set USITC_API_KEY
        if: env.USITC_API_KEY != ''
        run: supabase secrets set "USITC_API_KEY=$USITC_API_KEY" --project-ref "$PROJECT_REF"

      # notify-lead webhook path — Resend email notifications.
      # The inline path in apps/web/src/pages/api/submit-lead.ts uses Netlify
      # env vars instead and is independent of these.

      - name: Set RESEND_API_KEY
        if: env.RESEND_API_KEY != ''
        run: supabase secrets set "RESEND_API_KEY=$RESEND_API_KEY" --project-ref "$PROJECT_REF"

      - name: Set RESEND_FROM_EMAIL
        if: env.RESEND_FROM_EMAIL != ''
        run: supabase secrets set "RESEND_FROM_EMAIL=$RESEND_FROM_EMAIL" --project-ref "$PROJECT_REF"

      - name: Set NOTIFICATION_EMAIL
        if: env.NOTIFICATION_EMAIL != ''
        run: supabase secrets set "NOTIFICATION_EMAIL=$NOTIFICATION_EMAIL" --project-ref "$PROJECT_REF"

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
