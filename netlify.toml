[build]
  base = "apps/web"
  command = "cd ../.. && npm install && npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ."

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Note: Netlify automatically handles 404s for missing pages
# No redirect rules needed for static sites
#
# DO NOT add an `/api/*` → `/api/:splat/` rewrite rule here as a backstop for
# Astro's trailing-slash 308. Tested on the deploy preview for PR #2 — Astro's
# @astrojs/netlify adapter generates its own trailing-slash redirect at a layer
# that netlify.toml rules cannot intercept. The fix is to use trailing slashes
# directly in client-side `fetch()` and form `action` attributes (see all
# /api/* call sites in apps/web/src).

# Permanent redirect from the removed /products/ page to /catalog/.
# The Products page was a low-information overview that the new Catalog
# (with public pricing on 130+ SKUs) supplants. Both slash-variant and
# no-slash variant 301 to /catalog/ so any inbound link, GSC-indexed URL,
# or cached browser tab routes to the right destination.
[[redirects]]
  from = "/products"
  to = "/catalog/"
  status = 301
  force = true

[[redirects]]
  from = "/products/"
  to = "/catalog/"
  status = 301
  force = true

# HTTPS redirect
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.eia.gov https://api.fda.gov; font-src 'self' data:; frame-ancestors 'none';"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Edge functions for SSR pages
# Note: The @astrojs/netlify adapter v5+ generates functions in .netlify/v1/functions
# Netlify automatically detects this location, so no explicit directory config needed

# Context-specific settings
[context.production]
  command = "cd ../.. && npm install && npm run build"

[context.deploy-preview]
  command = "cd ../.. && npm install && npm run build"

[context.branch-deploy]
  command = "cd ../.. && npm install && npm run build"
